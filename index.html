<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dist/output.css">
    <title>じゃんけんボケモンバトル</title>
</head>
<body class="min-h-screen bg-[#d6d0a8] text-[#181018]">
    <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col items-center justify-center gap-4 p-4">
        <header class="w-full max-w-[960px] text-center">
            <h1>
                <img src="./src/logo.png" alt="じゃんけんポケモンバトル" class="mx-auto h-28 w-auto">
            </h1>
        </header>

        <section class="flex w-full max-w-[960px] flex-col items-center gap-3 rounded-lg border-4 border-[#181018] bg-[#f0e8c8] p-3 shadow-[8px_8px_0_#181018]">
            <div class="relative aspect-[10/9] w-full max-w-[480px] overflow-hidden rounded border-4 border-[#181018] bg-[#f0e8c8]">
                <canvas id="gameCanvas" width="480" height="432" class="h-full w-full [image-rendering:pixelated]"></canvas>
            </div>
            <div class="touch-controls" aria-label="スマホ操作">
                <div class="d-pad" aria-label="移動">
                    <button class="d-pad-button d-pad-up" type="button" data-virtual-key="ArrowUp" aria-label="上">▲</button>
                    <button class="d-pad-button d-pad-left" type="button" data-virtual-key="ArrowLeft" aria-label="左">◀</button>
                    <button class="d-pad-button d-pad-right" type="button" data-virtual-key="ArrowRight" aria-label="右">▶</button>
                    <button class="d-pad-button d-pad-down" type="button" data-virtual-key="ArrowDown" aria-label="下">▼</button>
                </div>
                <div class="action-pad" aria-label="アクション">
                    <button class="action-button action-cancel" type="button" data-virtual-key="x" aria-label="戻る">X</button>
                    <button class="action-button action-confirm" type="button" data-virtual-key="Enter" aria-label="決定">A</button>
                </div>
            </div>
            <div class="keyboard-help grid w-full max-w-[480px] grid-cols-2 gap-2 text-[10px] leading-5 sm:grid-cols-4">
                <p class="rounded border-2 border-[#181018] bg-[#f8f8f8] px-2 py-1">移動: ↑↓←→ / WASD</p>
                <p class="rounded border-2 border-[#181018] bg-[#f8f8f8] px-2 py-1">決定: Enter / Z</p>
                <p class="rounded border-2 border-[#181018] bg-[#f8f8f8] px-2 py-1">戻る: X</p>
                <p class="rounded border-2 border-[#181018] bg-[#f8f8f8] px-2 py-1">クリック: 決定</p>
            </div>
        </section>
    </main>

    <script src="js/constants.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/map.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
